function calcBeneficio({ pvp, costeProduccion, costeEnvio, unidades }) {
    const p = parseFloat(pvp);
    const c = parseFloat(costeProduccion);
    const e = parseFloat(costeEnvio);
    const u = parseFloat(unidades);
    if ([p, c, e, u].some((v) => Number.isNaN(v)))
        return null;
    return (p - c - e) * u;
}

function PosterWord({ label, active }) {
    const spanRef = useRef(null);
    const [scaleX, setScaleX] = useState(1);
    useEffect(() => {
        const measure = () => {
            const el = spanRef.current;
            if (!el)
                return;
            const parentWidth = el.parentElement.clientWidth * 0.9;
            const naturalWidth = el.scrollWidth;
            if (naturalWidth > 0) {
                setScaleX(parentWidth / naturalWidth);
            }
        };
        measure();
        window.addEventListener("resize", measure);
        return () => window.removeEventListener("resize", measure);
    }, [label]);
    return (React.createElement("span", { ref: spanRef, style: {
            display: "inline-block",
            fontFamily: "'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif",
            fontWeight: 900,
            lineHeight: 0.82,
            color: active ? "#F5F5F0" : "#3A3A3A",
            fontSize: "20vw",
            whiteSpace: "nowrap",
            transform: `scaleX(${scaleX})`,
            transformOrigin: "center",
        } }, label));
}
